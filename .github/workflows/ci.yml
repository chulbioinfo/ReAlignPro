name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Smoke tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: realignpro-ci
          create-args: >-
            python=3.11
            -c conda-forge
            -c bioconda

      - name: Install external binaries
        shell: bash -l {0}
        run: |
          micromamba install -y -n realignpro-ci -c conda-forge -c bioconda lastz muscle samtools

      - name: Install package (editable, with dev extras)
        shell: bash -l {0}
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        shell: bash -l {0}
        run: |
          pytest -q

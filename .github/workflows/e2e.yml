name: E2E demo

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 03:00 UTC (adjust as needed)
    - cron: "0 3 * * 0"

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: realignpro-e2e
          create-args: >-
            python=3.11
            -c conda-forge
            -c bioconda

      - name: Install external binaries
        shell: bash -l {0}
        run: |
          micromamba install -y -n realignpro-e2e -c conda-forge -c bioconda lastz muscle samtools

      - name: Install package (editable, with dev extras)
        shell: bash -l {0}
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run E2E demo
        shell: bash -l {0}
        run: |
          cd examples/test
          chmod +x run_test.sh
          ./run_test.sh
